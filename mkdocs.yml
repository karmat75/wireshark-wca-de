      - Zielgruppe: 00-orientierung/zielgruppe.md
      - Kursaufbau: 00-orientierung/kursaufbau.md
      - WCA-Bezug: 00-orientierung/wca-bezug.md
      - Rechtliches und Datenschutz: 00-orientierung/rechtliches-und-datenschutz.md

  - Lernumgebung:
      - Überblick: 01-lern-und-uebungsumgebung/index.md
      - Ubuntu installieren: 01-lern-und-uebungsumgebung/ubuntu-installieren.md
      - Pop!_OS Hinweise: 01-lern-und-uebungsumgebung/pop-os-hinweise.md
      - Benötigte Pakete installieren: 01-lern-und-uebungsumgebung/pakete-installieren.md
      - VSCode einrichten: 01-lern-und-uebungsumgebung/vscode-einrichten.md
      - Docker installieren: 01-lern-und-uebungsumgebung/docker-installieren.md
      - Wireshark installieren: 01-lern-und-uebungsumgebung/wireshark-installieren.md
      - Umgebung prüfen: 01-lern-und-uebungsumgebung/umgebung-pruefen.md

  - Linux-Grundlagen:
      - Überblick: 02-linux-grundlagen-fuer-den-kurs/index.md

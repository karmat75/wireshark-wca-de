site_name: Wireshark WCA DE
site_description: Deutschsprachiger Open-Source-Selbstlernkurs für Netzwerkanalyse mit Wireshark, ausgerichtet an WCA-101.
site_author: Wireshark WCA DE Contributors
site_url: https://karmat75.github.io/wireshark-wca-de/

repo_name: karmat75/wireshark-wca-de
repo_url: https://github.com/karmat75/wireshark-wca-de
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: de

  palette:
    - scheme: default
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Dunkles Design aktivieren

    - scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Helles Design aktivieren

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.tabs.link

plugins:
  - search:
      lang: de

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html

  - toc:
      permalink: true
      title: Auf dieser Seite

  - pymdownx.details

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite
  - pymdownx.snippets

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  generator: false

copyright: >
  Dieses Projekt ist ein unabhängiger deutschsprachiger Open-Source-Kurs.
  Es ist nicht offiziell mit der Wireshark Foundation verbunden.


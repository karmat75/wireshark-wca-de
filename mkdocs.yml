      - Dateien und Ordner: 02-linux-grundlagen-fuer-den-kurs/dateien-und-ordner.md
      - Paketverwaltung: 02-linux-grundlagen-fuer-den-kurs/paketverwaltung.md
      - Netzwerkbefehle: 02-linux-grundlagen-fuer-den-kurs/netzwerkbefehle.md
      - Rechte und Gruppen: 02-linux-grundlagen-fuer-den-kurs/rechte-und-gruppen.md

  - Wireshark erster Kontakt:
      - Überblick: 03-wireshark-erster-kontakt/index.md
      - Oberfläche verstehen: 03-wireshark-erster-kontakt/oberflaeche-verstehen.md
      - Erstes Capture öffnen: 03-wireshark-erster-kontakt/erstes-capture-oeffnen.md
      - Profile und Spalten: 03-wireshark-erster-kontakt/profile-und-spalten.md
      - TShark erster Kontakt: 03-wireshark-erster-kontakt/tshark-erster-kontakt.md

  - Basis-Kurs:
